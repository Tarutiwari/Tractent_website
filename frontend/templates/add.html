{% extends "../index.html" %}

{% block title %}Add Tractor - Tractent{% endblock %}

{% block content %}

<style>
    .add-tractor-container {
        max-width: 600px;
        margin: 3rem auto;
        padding: 0 1rem;
    }

    .add-tractor-card {
        background: white;
        border-radius: 12px;
        padding: 2.5rem;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        border-top: 4px solid #059669;
    }

    .add-tractor-card h2 {
        font-size: 2rem;
        font-weight: 800;
        color: #1e293b;
        margin-bottom: 1.5rem;
        text-align: center;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        font-weight: 600;
        color: #1e293b;
        margin-bottom: 0.5rem;
        font-size: 0.95rem;
    }

    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 12px;
        border: 2px solid #d1f4e8;
        border-radius: 8px;
        font-size: 1rem;
        font-family: inherit;
        transition: all 0.3s ease;
        background: #f0fdf4;
        color: #1e293b;
    }

    .form-group input:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: #059669;
        box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
    }

    .file-input-label {
        display: block;
        padding: 20px;
        border: 2px dashed #059669;
        border-radius: 8px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        background: #ecfdf5;
        color: #059669;
        font-weight: 600;
    }

    .file-input-label:hover {
        background: #059669;
        color: white;
    }

    .file-input-label input {
        display: none;
    }

    .btn-submit {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #059669, #10b981);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(5, 150, 105, 0.3);
    }
</style>

<div class="add-tractor-container">
    <div class="add-tractor-card">
        <h2><i class="fas fa-tractor"></i> Add Your Tractor</h2>

        <form id="add-tractor-form" enctype="multipart/form-data">

            <div class="form-group">
                <label for="name"><i class="fas fa-heading"></i> Tractor Name</label>
                <input type="text" id="name" name="name" placeholder="e.g., John Deere 5050E" required>
            </div>

            <div class="form-group">
                <label for="model"><i class="fas fa-microchip"></i> Model</label>
                <input type="text" id="model" name="model" placeholder="e.g., 5050E" required>
            </div>

            <div class="form-group">
                <label for="price"><i class="fas fa-tag"></i> Price Per Day (₹)</label>
                <input type="number" id="price" name="price" placeholder="e.g., 5000" min="0" required>
            </div>

            <div class="form-group">
                <label for="location"><i class="fas fa-map-marker-alt"></i> Location</label>
                <input type="text" id="location" name="location" placeholder="e.g., Mumbai, Maharashtra" required>
            </div>

            <div class="form-group">
                <label for="image"><i class="fas fa-image"></i> Upload Image</label>
                <label for="image-input" class="file-input-label">
                    <i class="fas fa-cloud-upload-alt"></i> Click to upload tractor image
                </label>
                <input type="file" id="image-input" name="image" accept="image/*">
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-plus"></i> Add Tractor
            </button>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const addForm = document.getElementById('add-tractor-form');
        if (addForm) {
            addForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(addForm);

                try {
                    const response = await fetch('/api/tractors', {
                        method: 'POST',
                        body: formData
                    });
                    const result = await response.json();

                    if (result.success) {
                        alert('Tractor added successfully!');
                        window.location.href = '/tractorview';
                    } else {
                        alert(result.message || 'Failed to add tractor.');
                    }
                } catch (error) {
                    console.error('Error adding tractor:', error);
                    alert('An error occurred while adding the tractor.');
                }
            });
        }
    });
</script>

{% endblock %}
