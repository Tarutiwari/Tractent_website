{% extends "../index.html" %}

{% block title %}Home - Tractent | Smart Agricultural Solutions{% endblock %}

{% block content %}

<div class="hero-section">
    <div class="hero-overlay">
        <div class="hero-content">
            <h1><i class="fas fa-tractor"></i> Welcome to Tractent</h1>
            <p>Powering the Future of Smart Agriculture</p>
            <div class="hero-cta">
                {% if session.get('user_email') %}
                    <a href="/tractorview" style="background: linear-gradient(135deg, #f59e0b, #fb923c); color: white; padding: 12px 32px; border-radius: 8px; text-decoration: none; font-weight: 700; transition: all 0.3s ease; display: inline-block; text-transform: uppercase; letter-spacing: 0.5px;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 10px 15px -3px rgba(0, 0, 0, 0.2)';" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none';">
                        <i class="fas fa-search"></i> Browse Tractors
                    </a>
                {% else %}
                    <a href="/login" style="background: linear-gradient(135deg, #059669, #10b981); color: white; padding: 12px 32px; border-radius: 8px; text-decoration: none; font-weight: 700; transition: all 0.3s ease; display: inline-block; text-transform: uppercase; letter-spacing: 0.5px;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 10px 15px -3px rgba(5, 150, 105, 0.3)';" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none';">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </a>
                    <a href="/signup" style="background: linear-gradient(135deg, #059669, #10b981); color: white; padding: 12px 32px; border-radius: 8px; text-decoration: none; font-weight: 700; transition: all 0.3s ease; display: inline-block; text-transform: uppercase; letter-spacing: 0.5px;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 10px 15px -3px rgba(0, 0, 0, 0.2)';" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none';">
                        <i class="fas fa-user-plus"></i> Sign Up
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</div>

<style>
    .hero-section {
        position: relative;
        width: 100%;
        min-height: 100vh;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .hero-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, rgba(15, 23, 42, 0.75), rgba(30, 64, 175, 0.6));
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        text-align: center;
        z-index: 1;
    }

    .hero-content {
        position: relative;
        z-index: 2;
        max-width: 800px;
        animation: fadeInUp 1s ease-out;
    }

    .hero-content h1 {
        font-size: 4rem;
        font-weight: 900;
        margin-bottom: 1rem;
        letter-spacing: -1px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .hero-content p {
        font-size: 1.5rem;
        margin-bottom: 2.5rem;
        color: rgba(255, 255, 255, 0.95);
        font-weight: 300;
        letter-spacing: 0.5px;
    }

    .hero-cta {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @media (max-width: 768px) {
        .hero-content h1 {
            font-size: 2.5rem;
        }

        .hero-content p {
            font-size: 1.1rem;
        }
    }

    @media (max-width: 500px) {
        .hero-content h1 {
            font-size: 1.8rem;
        }

        .hero-content p {
            font-size: 1rem;
        }

        .hero-cta {
            flex-direction: column;
            gap: 0.8rem;
        }

        .hero-cta a {
            width: 100%;
        }
    }
</style>

<script>
    window.onload = function () {
        const bgImages = [
            "{{ url_for('static', filename='5e76417bd30b4a51b87f4be96ba1faeb.jpg') }}",
            "{{ url_for('static', filename='16d0ac4d2cf05e211cdcdb8c797adcb0.jpg') }}",
            "{{ url_for('static', filename='28d86106e5c6b93f83625e5e4a2ed420.jpg') }}",
            "{{ url_for('static', filename='718fbcbad805ba4f5f8808de861b754e.jpg') }}",
            "{{ url_for('static', filename='92352f5f954b9643e3cbeba2695b7fcf.jpg') }}",
            "{{ url_for('static', filename='c68d7afad8fdb220d715c012eeea7b4f.jpg') }}"
        ];

        let bgIndex = 0;
        const hero = document.querySelector(".hero-section");

        function changeBackground() {
            hero.style.backgroundImage = `url(${bgImages[bgIndex]})`;
            bgIndex = (bgIndex + 1) % bgImages.length;
        }

        changeBackground();
        setInterval(changeBackground, 2000);
    }
</script>

{% endblock %}
