{% extends "../index.html" %}

{% block title %}Book Tractor - Tractent{% endblock %}

{% block content %}

<style>
    .booking-container {
        max-width: 600px;
        margin: 3rem auto;
        padding: 0 1rem;
    }

    .booking-card {
        background: white;
        border-radius: 12px;
        padding: 2.5rem;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        border-top: 4px solid #059669;
    }

    .booking-card h2 {
        font-size: 2rem;
        font-weight: 800;
        color: #1e293b;
        margin-bottom: 1.5rem;
        text-align: center;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        font-weight: 600;
        color: #1e293b;
        margin-bottom: 0.5rem;
        font-size: 0.95rem;
    }

    .form-group input {
        width: 100%;
        padding: 12px;
        border: 2px solid #d1f4e8;
        border-radius: 8px;
        font-size: 1rem;
        font-family: inherit;
        transition: all 0.3s ease;
        background: #f0fdf4;
        color: #1e293b;
    }

    .form-group input:focus {
        outline: none;
        border-color: #059669;
        box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
    }

    .button-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-top: 2rem;
    }

    .btn-primary {
        padding: 12px;
        background: linear-gradient(135deg, #059669, #10b981);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(5, 150, 105, 0.3);
    }

    .btn-secondary {
        padding: 12px;
        background: transparent;
        color: #059669;
        border: 2px solid #059669;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .btn-secondary:hover {
        background: #059669;
        color: white;
        transform: translateY(-2px);
    }
</style>

<div class="booking-container">
    <div class="booking-card">
        <h2><i class="fas fa-calendar-check"></i> Book {{ tractor.tractor_model }}</h2>

        <form id="booking-form">
            <input type="hidden" name="tractor_id" value="{{ tractor_id }}">

            <div class="form-group">
                <label for="delivery_location"><i class="fas fa-map-marker-alt"></i> Delivery Location</label>
                <input type="text" id="delivery_location" name="delivery_location" placeholder="Where should we deliver?" required>
            </div>

            <div class="form-group">
                <label for="start_date"><i class="fas fa-calendar"></i> Start Date</label>
                <input type="date" id="start_date" name="start_date" required>
            </div>

            <div class="form-group">
                <label for="end_date"><i class="fas fa-calendar"></i> End Date</label>
                <input type="date" id="end_date" name="end_date" required>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-primary">
                    <i class="fas fa-check"></i> Confirm Booking
                </button>
                <a href="{{ url_for('tractor_view') }}" class="btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='js/booking.js') }}"></script>
{% endblock %}
